apiVersion: v1
kind: Service
metadata:
  name: lacuna
  labels:
    app.kubernetes.io/name: lacuna
spec:
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: lacuna
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tailscale-lacuna
  labels:
    app.kubernetes.io/name: lacuna
spec:
  ingressClassName: tailscale
  defaultBackend:
    service:
      name: lacuna
      port:
        name: http
  tls:
    - hosts:
        - lacuna
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: lacuna
  labels:
    app.kubernetes.io/name: lacuna
    release: prometheus-operator
spec:
  namespaceSelector:
    matchNames:
    - default
  selector:
    matchLabels:
      app.kubernetes.io/name: lacuna
  endpoints:
  - port: http
---
apiVersion: v1
kind: Secret
metadata:
  name: lacuna
  labels:
    app.kubernetes.io/name: lacuna
type: Opaque
stringData:
  ANTHROPIC_API_KEY: "your-anthropic-api-key"
  BEDROCK_API_KEY: "your-bedrock-api-key"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: lacuna-config
  labels:
    app.kubernetes.io/name: lacuna
data:
  lacuna-config.json: |
      {
        "lacuna": {
          "identity_header": "Tailscale-User-Login",
          "logging": {
            "format": "json",
            "level": "info"
          }
        },
        "providers": {
          "anthropic": {
            "name": "Anthropic",
            "baseurl": "https://api.anthropic.com",
            "authorization": "x-api-key",
            "apikey": "${ANTHROPIC_API_KEY}",
            "compatibility": {
              "anthropic_messages": true
            }
          },
          "bedrock": {
            "name": "AWS Bedrock",
            "baseurl": "https://bedrock-runtime.us-east-1.amazonaws.com",
            "authorization": "bearer",
            "apikey": "${BEDROCK_API_KEY}",
            "compatibility": {
              "bedrock_model_invoke": true
            }
          }
        }
      }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lacuna
  labels:
    app.kubernetes.io/name: lacuna
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: lacuna
  template:
    metadata:
      labels:
        app.kubernetes.io/name: lacuna
    spec:
      containers:
      - name: lacuna
        image: ghcr.io/flared/lacuna:v0.10.0
        imagePullPolicy: IfNotPresent
        args: [
          "--config", "/opt/lacuna-config.json",
          "--host", "0.0.0.0",
          "--port", "80",
        ]
        ports:
        - containerPort: 80
          name: http
        readinessProbe:
          httpGet:
            path: /health
            port: 80
        livenessProbe:
          httpGet:
            path: /health
            port: 80
        resources:
          limits:
            memory: 100Mi
          requests:
            cpu: 100m
            memory: 100Mi
        env:
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: lacuna
              key: ANTHROPIC_API_KEY
        - name: BEDROCK_API_KEY
          valueFrom:
            secretKeyRef:
              name: lacuna
              key: BEDROCK_API_KEY
        volumeMounts:
        - name: lacuna-config
          mountPath: /opt/lacuna-config.json
          subPath: lacuna-config.json
      volumes:
      - name: lacuna-config
        configMap:
          name: lacuna-config
